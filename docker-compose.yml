services:
  db:
    image: postgres:15-alpine
    container_name: zotion-db
    environment:
      - POSTGRES_DB=zotion_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zotion_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: zotion-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/zotion_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - JWT_PUBLIC_KEY=classpath:certs/key.pub
      - JWT_PRIVATE_KEY=classpath:certs/key.priv