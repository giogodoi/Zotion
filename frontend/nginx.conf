server {
    listen 80;
    server_name localhost;

    # 1. Configuração para o Frontend (React/Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        #O try_files é nosso fallback.
    }

    location /api/ {
        proxy_pass http://app:8080/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configurações extras para Timeout... 
        # Por que isso, Giovane? 
        # Em casos de arquivos muito pesados na função com o Gemini, é necessário mais tempo para retorno!
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}